version: '3.8'

services:
  webui:
    build:
      context: ./webui
    container_name: mc_webui
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - WEBUI_ADMIN_USER=${WEBUI_ADMIN_USER:-admin}
      - WEBUI_ADMIN_PASS=${WEBUI_ADMIN_PASS:-Hehehe@123}
      - JWT_SECRET=${JWT_SECRET:-supersecret123}
      - MC_SERVER_DIR=/app/atmg
      - DOCKER_CONTAINER_NAME=atmg
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./atmg:/app/atmg
    restart: unless-stopped
  mc:
    image: itzg/minecraft-server
    container_name: atmg
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
      - "19565:19565"
    environment:
      EULA: "true"
      MODPACK_PLATFORM: AUTO_CURSEFORGE
      CF_API_KEY: ${CF_API_KEY}
      CF_SLUG: all-the-mods-gravitas2
      CF_OVERRIDES_EXCLUSIONS: |
        shaderpacks/**
        mods/colorwheel*.jar
        mods/ok_zoomer-forge-5.4.0-beta.8.jar
        mods/particlerain-4.0.0-beta.3+1.20.1-forge.jar
      CF_EXCLUDE_MODS: |
        colorwheel
        colorwheel-patcher
      MEMORY: 8G
      DIFFICULTY: HARD
      ONLINE_MODE: FALSE
      PVP: FALSE
    volumes:
      # attach a managed volume, change to a relative or absolute host directory if needed
      - ./atmg:/data
  playit:
    image: ghcr.io/playit-cloud/playit-agent:0.15.26
    container_name: playit_tunnel
    network_mode: host
    restart: always
    environment: 
      - SECRET_KEY=${PLAYIT_KEY}
    stdin_open: true
    tty: true
  cloudflared:
    image: cloudflare/cloudflared:latest
    network_mode: host
    container_name: cloudflared
    command: tunnel run
    volumes:
      - /home/user/.cloudflared:/etc/cloudflared
  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - /home/user/myapp/prometheus:/etc/prometheus
      - ./prometheus-data:/prometheus