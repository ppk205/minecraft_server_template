version: '3.8'

services:
  webui:
    build:
      context: ./webui
    container_name: mc_webui
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - WEBUI_ADMIN_USER=${WEBUI_ADMIN_USER:-admin}
      - WEBUI_ADMIN_PASS=${WEBUI_ADMIN_PASS:-Hehehe@123}
      - JWT_SECRET=${JWT_SECRET:-supersecret123}
      - MC_SERVER_DIR=/app/atmg
      - DOCKER_CONTAINER_NAME=atmg
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./atmg:/app/atmg
    restart: unless-stopped
  mc:
    image: itzg/minecraft-server
    container_name: atmg
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
      - "19565:19565"
    environment:
      EULA: "true"
      TYPE: ${MC_TYPE:-AUTO_CURSEFORGE}
      CF_API_KEY: ${MC_CF_API_KEY:-}
      CF_SLUG: ${MC_CF_SLUG:-all-the-mods-gravitas2}
      CF_OVERRIDES_EXCLUSIONS: |
        shaderpacks/**
        mods/colorwheel*.jar
        mods/ok_zoomer-forge-5.4.0-beta.8.jar
        mods/particlerain-4.0.0-beta.3+1.20.1-forge.jar
      CF_EXCLUDE_MODS: |
        colorwheel
        colorwheel-patcher
      MEMORY: ${MC_MEMORY:-8G}
      DIFFICULTY: HARD
      ONLINE_MODE: FALSE
      PVP: FALSE
    volumes:
      # attach a managed volume, change to a relative or absolute host directory if needed
      - ./atmg:/data
  playit:
    image: ghcr.io/playit-cloud/playit-agent:0.15.26
    container_name: playit_tunnel
    network_mode: host
    restart: always
    environment: 
      - SECRET_KEY=${PLAYIT_KEY}
    stdin_open: true
    tty: true
    profiles:
      - playit
  cloudflared:
    image: cloudflare/cloudflared:latest
    network_mode: host
    container_name: cloudflared
    command: tunnel run
    volumes:
      - /home/user/.cloudflared:/etc/cloudflared
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}
    profiles:
      - cloudflared
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok_tunnel
    network_mode: host
    restart: unless-stopped
    command: tcp 25565
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    profiles:
      - ngrok
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    network_mode: host
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale_data:/var/lib/tailscale
    restart: unless-stopped
    profiles:
      - tailscale
  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
volumes:
  tailscale_data: